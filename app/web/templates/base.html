<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ценовая аналитика{% endblock %}</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --card: #1a2332;
            --card-hover: #1e2a3e;
            --text: #e6edf3;
            --text-2: #8b949e;
            --muted: #8b9cb3;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #30363d;
            --success: #22c55e;
            --success-bg: rgba(34,197,94,0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245,158,11,0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239,68,68,0.1);
            --info-bg: rgba(59,130,246,0.1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            font-size: 14px;
        }

        /* ─── Header ─── */
        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-logo {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            letter-spacing: -0.01em;
            flex-shrink: 0;
        }
        .site-logo .logo-accent { color: var(--accent); }
        nav { display: flex; gap: 0.2rem; flex-wrap: wrap; }
        nav a {
            color: var(--text-2);
            text-decoration: none;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.84rem;
            transition: color 0.15s, background 0.15s;
        }
        nav a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        nav a.nav-active { color: var(--accent); background: var(--info-bg); font-weight: 500; }

        /* ─── Main layout ─── */
        main { padding: 1.5rem; max-width: 1280px; margin: 0 auto; }
        .page-header { margin-bottom: 1.25rem; }
        .page-header h1 { font-size: 1.1rem; font-weight: 600; }
        .page-header .page-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }

        /* ─── Cards ─── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .card-title {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .card-header .card-title { margin-bottom: 0; }

        /* ─── KPI grid ─── */
        .kpi-grid {
            display: grid;
            gap: 0.9rem;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            margin-bottom: 1.25rem;
        }
        .kpi-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.2rem;
        }
        .kpi-label { font-size: 0.77rem; color: var(--muted); margin-bottom: 0.4rem; }
        .kpi-value {
            font-size: 1.65rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
        }
        .kpi-value.kv-accent  { color: var(--accent); }
        .kpi-value.kv-warning { color: var(--warning); }
        .kpi-value.kv-danger  { color: var(--danger); }
        .kpi-value.kv-success { color: var(--success); }
        .kpi-value.kv-muted   { color: var(--muted); }
        .kpi-sub { font-size: 0.77rem; color: var(--muted); margin-top: 0.3rem; }

        /* ─── Attention items ─── */
        .attention-list { display: flex; flex-direction: column; gap: 0.4rem; }
        .attention-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.85rem;
            border-radius: 7px;
            font-size: 0.84rem;
            line-height: 1.4;
        }
        .attention-item.ai-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
        .attention-item.ai-danger  { background: var(--danger-bg);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.2); }
        .attention-item.ai-info    { background: var(--info-bg);    color: var(--accent);  border: 1px solid rgba(59,130,246,0.2); }
        .attention-item.ai-muted   { background: rgba(139,156,179,0.07); color: var(--muted); border: 1px solid var(--border); }
        .attention-item .ai-link {
            margin-left: auto;
            color: inherit;
            text-decoration: underline;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ─── Two-column grid ─── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

        /* ─── Tables ─── */
        table { width: 100%; border-collapse: collapse; font-size: 0.855rem; }
        th, td { text-align: left; padding: 0.5rem 0.65rem; border-bottom: 1px solid var(--border); }
        th {
            color: var(--muted);
            font-weight: 500;
            font-size: 0.77rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: rgba(0,0,0,0.15);
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); }

        /* ─── Forms ─── */
        .form-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        label.form-label { font-size: 0.82rem; color: var(--muted); }
        input, select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.42rem 0.65rem;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, select:focus { border-color: var(--accent); }

        /* ─── Buttons ─── */
        .btn {
            cursor: pointer;
            padding: 0.42rem 0.85rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border: 1px solid transparent;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        button { font-family: inherit; }
        .btn-primary  { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-confirm  { background: #16a34a; border-color: #16a34a; color: #fff; }
        .btn-confirm:hover { background: #15803d; }
        .btn-reject   { background: #374151; border-color: #4b5563; color: var(--text-2); }
        .btn-reject:hover { background: #4b5563; }
        .btn-ghost    { background: transparent; border-color: var(--border); color: var(--text-2); }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .btn-sm { padding: 0.28rem 0.6rem; font-size: 0.8rem; }

        /* ─── Badges ─── */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 500;
            line-height: 1.4;
            background: rgba(139,156,179,0.12);
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .badge-success { background: var(--success-bg); color: var(--success); border-color: rgba(34,197,94,0.25); }
        .badge-warning { background: var(--warning-bg); color: var(--warning); border-color: rgba(245,158,11,0.25); }
        .badge-danger  { background: var(--danger-bg);  color: var(--danger);  border-color: rgba(239,68,68,0.25); }
        .badge-info    { background: var(--info-bg);    color: var(--accent);  border-color: rgba(59,130,246,0.25); }

        /* ─── Confidence pip ─── */
        .conf-pip {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 4px;
        }
        .conf-high   { background: var(--success); }
        .conf-medium { background: var(--warning); }
        .conf-low    { background: var(--muted); }

        /* ─── Filter tabs ─── */
        .filter-tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .filter-tab {
            padding: 0.28rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            background: rgba(139,156,179,0.07);
            border: 1px solid var(--border);
            color: var(--muted);
            transition: all 0.15s;
        }
        .filter-tab:hover, .filter-tab.ft-active {
            background: var(--info-bg);
            border-color: rgba(59,130,246,0.3);
            color: var(--accent);
        }

        /* ─── Misc ─── */
        a.row-link { color: var(--accent); text-decoration: none; }
        a.row-link:hover { text-decoration: underline; }
        .muted { color: var(--muted); font-size: 0.85rem; }
        .text-danger  { color: var(--danger); }
        .text-warning { color: var(--warning); }
        .text-success { color: var(--success); }

        .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
        .empty-state .empty-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.85rem; margin-top: 0.35rem; }

        .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

        .stats-row { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: baseline; }
        .stats-row .sr-item { display: flex; align-items: baseline; gap: 0.35rem; }
        .stats-row .sr-num { font-size: 1.2rem; font-weight: 700; }
        .stats-row .sr-lbl { font-size: 0.8rem; color: var(--muted); }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
<header class="site-header">
    <div class="site-logo">Price<span class="logo-accent">Desk</span></div>
    <nav>
        <a href="/" {% if request.url.path == "/" %}class="nav-active"{% endif %}>Сегодня</a>
        <a href="/market" {% if request.url.path == "/market" %}class="nav-active"{% endif %}>Рынок</a>
        <a href="/sources" {% if request.url.path == "/sources" %}class="nav-active"{% endif %}>Источники</a>
        <a href="/products" {% if request.url.path.startswith("/products") %}class="nav-active"{% endif %}>Товары</a>
        <a href="/alerts" {% if request.url.path == "/alerts" %}class="nav-active"{% endif %}>Алерты</a>
        <a href="/matches" {% if request.url.path == "/matches" %}class="nav-active"{% endif %}>Сопоставления</a>
        <a href="/docs" {% if request.url.path == "/docs" %}class="nav-active"{% endif %}>API</a>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
