# Локальная разработка: доступ к PostgreSQL и Adminer с хоста.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  db:
    ports:
      - "5432:5432"

  adminer:
    ports:
      - "8080:8080"

  # Локальный прайс ТДМ (заявка Рыбинск): положите zayavka77rybinsk.xls в корень репозитория, в .env:
  # LOCAL_PRICE_XLS_PATH=/data/zayavka77rybinsk.xls
  collector:
    volumes:
      - ./zayavka77rybinsk.xls:/data/zayavka77rybinsk.xls:ro
