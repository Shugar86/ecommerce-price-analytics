services:
  db:
    image: postgres:15-alpine
    container_name: prices_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-courseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coursepass}
      POSTGRES_DB: ${POSTGRES_DB:-prices_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courseuser} -d ${POSTGRES_DB:-prices_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prices_network

  adminer:
    image: adminer:latest
    container_name: prices_adminer
    depends_on:
      - db
    networks:
      - prices_network

  collector:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: prices_collector
    command: python -m app.collector
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_USER: ${POSTGRES_USER:-courseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coursepass}
      POSTGRES_DB: ${POSTGRES_DB:-prices_db}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      # Лимит строк с крупных фидов (0 = без лимита). Пример: 3000 для быстрого первого прогона.
      SHOP_ITEM_LIMIT: ${SHOP_ITEM_LIMIT:-20000}
      ENABLE_FAKESTORE: ${ENABLE_FAKESTORE:-}
      EKF_TIMEOUT_CONNECT: ${EKF_TIMEOUT_CONNECT:-}
      EKF_TIMEOUT_READ: ${EKF_TIMEOUT_READ:-}
      TDM_TIMEOUT_SEC: ${TDM_TIMEOUT_SEC:-}
      COMPLECT_TIMEOUT_CONNECT: ${COMPLECT_TIMEOUT_CONNECT:-}
      COMPLECT_TIMEOUT_READ: ${COMPLECT_TIMEOUT_READ:-}
      COMPLECT_MAX_ROWS: ${COMPLECT_MAX_ROWS:-}
      SYPEROPT_TIMEOUT_CONNECT: ${SYPEROPT_TIMEOUT_CONNECT:-}
      SYPEROPT_TIMEOUT_READ: ${SYPEROPT_TIMEOUT_READ:-}
      SYPEROPT_MAX_ROWS: ${SYPEROPT_MAX_ROWS:-}
      ENABLE_BARCODES_CATALOG_API: ${ENABLE_BARCODES_CATALOG_API:-}
      BARCODES_CATALOG_API_MAX_CALLS: ${BARCODES_CATALOG_API_MAX_CALLS:-}
      BARCODES_CATALOG_API_RPS: ${BARCODES_CATALOG_API_RPS:-}
      BARCODES_CATALOG_API_BASE: ${BARCODES_CATALOG_API_BASE:-}
      ENABLE_OWWA: ${ENABLE_OWWA:-}
      OWWA_API_BASE: ${OWWA_API_BASE:-}
      OWWA_API_CLIENT_ID: ${OWWA_API_CLIENT_ID:-}
      OWWA_API_TOKEN: ${OWWA_API_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prices_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: prices_bot
    command: python -m app.bot
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_USER: ${POSTGRES_USER:-courseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coursepass}
      POSTGRES_DB: ${POSTGRES_DB:-prices_db}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      BOT_TOKEN: ${BOT_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      collector:
        condition: service_started
    restart: unless-stopped
    networks:
      - prices_network

  web:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: prices_web
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8000
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_USER: ${POSTGRES_USER:-courseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coursepass}
      POSTGRES_DB: ${POSTGRES_DB:-prices_db}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      WEB_BASIC_AUTH_USER: ${WEB_BASIC_AUTH_USER:-}
      WEB_BASIC_AUTH_PASSWORD: ${WEB_BASIC_AUTH_PASSWORD:-}
      OUR_PRICING_SOURCE: ${OUR_PRICING_SOURCE:-}
      OUR_PRICING_SOURCE_PRIORITY: ${OUR_PRICING_SOURCE_PRIORITY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      collector:
        condition: service_started
    restart: unless-stopped
    networks:
      - prices_network

  ai_worker:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: prices_ai_worker
    command: python -m app.ai_worker
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_USER: ${POSTGRES_USER:-courseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coursepass}
      POSTGRES_DB: ${POSTGRES_DB:-prices_db}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      AI_WORKER_INTERVAL_SEC: ${AI_WORKER_INTERVAL_SEC:-300}
      SEED_DEMO_HISTORY: ${SEED_DEMO_HISTORY:-1}
      OUR_PRICING_SOURCE: ${OUR_PRICING_SOURCE:-}
      OUR_PRICING_SOURCE_PRIORITY: ${OUR_PRICING_SOURCE_PRIORITY:-}
      AI_MATCH_MIN_SCORE: ${AI_MATCH_MIN_SCORE:-}
      AI_MATCH_LIMIT_PER_SHOP: ${AI_MATCH_LIMIT_PER_SHOP:-}
      AI_MATCH_NORMALIZED_LEFT: ${AI_MATCH_NORMALIZED_LEFT:-}
      AI_MATCH_NORMALIZED_RIGHT: ${AI_MATCH_NORMALIZED_RIGHT:-}
      AI_MATCH_SOURCE_PAIRS: ${AI_MATCH_SOURCE_PAIRS:-}
      AI_MATCH_OFFER_CAP: ${AI_MATCH_OFFER_CAP:-}
      USE_LEGACY_PRODUCT_MATCHING: ${USE_LEGACY_PRODUCT_MATCHING:-}
    depends_on:
      db:
        condition: service_healthy
      collector:
        condition: service_started
    restart: unless-stopped
    networks:
      - prices_network

volumes:
  postgres_data:

networks:
  prices_network:
    driver: bridge

