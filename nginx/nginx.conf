# Конфигурация nginx как балансировщика нагрузки для двух реплик FastAPI.
# Используется только с docker-compose.loadtest.yml.
# Алгоритм: round-robin через переменные + Docker DNS-резолвер.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker DNS-сервер — необходим для динамического разрешения имён
    # сервисов compose в runtime (а не только при запуске nginx).
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 3s;

    server {
        listen 80;
        server_name _;

        # Распределение по модулю от ip клиента (упрощённый round-robin)
        # Переменный proxy_pass заставляет nginx использовать resolver
        # для разрешения имён в runtime, а не при старте контейнера.
        set $upstream_web1 "web1:8000";
        set $upstream_web2 "web2:8000";

        location / {
            # Простое чётное/нечётное разделение на основе nginx $request_id
            if ($request_id ~* "^[0-9a-f]{31}[02468ace]$") {
                proxy_pass http://$upstream_web1;
                break;
            }
            proxy_pass http://$upstream_web2;

            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Replica         "nginx-lb";

            proxy_read_timeout  60s;
            proxy_connect_timeout 10s;
        }

        location /nginx-health {
            return 200 "nginx upstream ok\n";
            add_header Content-Type text/plain;
        }
    }
}
